# Terraform CI/CD Pipeline
#
# Release Lifecycle:
# 1. Developer creates feature branch, writes Terraform code
# 2. PR opened -> triggers lint + validate + plan (automatic)
# 3. Plan output posted as PR comment for review
# 4. PR approved and merged to main
# 5. Push to main triggers plan + apply with environment protection rules
# 6. Dev environment applies first (auto-approve or minimal gate)
# 7. Prod environment requires manual approval in GitHub Environments
# 8. State stored in Azure Storage Account backend (locked during operations)
# 9. Destroy: manual workflow_dispatch trigger with confirmation input
#
# Authentication:
# Uses OIDC Workload Identity Federation (recommended over service principal secrets).
# Required secrets (set in GitHub repo settings):
#   AZURE_CLIENT_ID         - App registration client ID
#   AZURE_TENANT_ID         - Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID   - Target Azure subscription
#   TF_VAR_ssh_public_key   - SSH public key for VM auth (all environments)
#
# Required GitHub Environments:
#   dev  - No approval required (auto-deploy on push to main)
#   prod - Required reviewers: 1 approver before apply

name: 'Terraform CI/CD'

on:
  push:
    branches: [main]
    paths: ['modules/**', 'environments/**', '.github/workflows/**']
  pull_request:
    branches: [main]
    paths: ['modules/**', 'environments/**', '.github/workflows/**']

env:
  TF_VERSION: '1.5.7'
  TFLINT_VERSION: 'v0.50.0'
  WORKING_DIR: '.'

permissions:
  contents: read
  pull-requests: write
  id-token: write  # Required for OIDC authentication

jobs:
  # ── Stage 1: Format, Lint, and Security Scan ────────────────────────────────
  lint-and-validate:
    name: 'Lint, Format & Security Scan'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # terraform fmt: ensures consistent HCL formatting across all files
      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff
        working-directory: ${{ env.WORKING_DIR }}

      # tflint: catches common Terraform errors, Azure-specific issues, naming conventions
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: TFLint Init (download plugins)
        run: tflint --init
        working-directory: ${{ env.WORKING_DIR }}

      - name: TFLint - Modules
        run: |
          for mod in modules/*/; do
            echo "=== Linting $mod ==="
            tflint --chdir="$mod"
          done
        working-directory: ${{ env.WORKING_DIR }}

      - name: TFLint - Environments
        run: |
          for env_dir in environments/*/; do
            echo "=== Linting $env_dir ==="
            tflint --chdir="$env_dir"
          done
        working-directory: ${{ env.WORKING_DIR }}

      # checkov: static security analysis for Terraform (CIS Azure benchmarks)
      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.WORKING_DIR }}
          framework: terraform
          soft_fail: true  # Warn but don't fail the pipeline (adjust for stricter gates)
          output_format: cli
          output_file_path: console


  # ── Stage 2: Terraform Plan (matrix: dev + prod) ──────────────────────────
  plan:
    name: 'Plan - ${{ matrix.environment }}'
    runs-on: ubuntu-latest
    needs: lint-and-validate

    strategy:
      fail-fast: false  # Plan both envs even if one fails
      matrix:
        environment: [dev, prod]

    env:
      TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_ssh_public_key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # OIDC login — no long-lived credentials stored in GitHub
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -backend=false  # No backend during PR/plan-only runs
        working-directory: ${{ env.WORKING_DIR }}/environments/${{ matrix.environment }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}/environments/${{ matrix.environment }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -out=tfplan-${{ matrix.environment }} \
            -no-color 2>&1 | tee plan-output.txt
        working-directory: ${{ env.WORKING_DIR }}/environments/${{ matrix.environment }}

      # Upload plan binary for use by apply job
      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: ${{ env.WORKING_DIR }}/environments/${{ matrix.environment }}/tfplan-${{ matrix.environment }}
          retention-days: 5

      # Post plan summary as PR comment for peer review
      # Note: plan output is read from file, not from inline context interpolation
      - name: Post Plan to PR Comment
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN_ENV: ${{ matrix.environment }}
          PLAN_FILE: ${{ env.WORKING_DIR }}/environments/${{ matrix.environment }}/plan-output.txt
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            const planFile = process.env.PLAN_FILE;
            const planEnv = process.env.PLAN_ENV;
            const workflowName = process.env.WORKFLOW_NAME;
            const runId = process.env.RUN_ID;

            const planOutput = fs.readFileSync(planFile, 'utf8');
            const maxLength = 65000;
            const truncated = planOutput.length > maxLength
              ? planOutput.substring(0, maxLength) + '\n...[truncated]'
              : planOutput;

            const body = `## Terraform Plan - \`${planEnv}\`

            <details>
            <summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Workflow: \`${workflowName}\` | Run: \`${runId}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ── Stage 3: Terraform Apply (push to main only, with env gates) ──────────
  apply:
    name: 'Apply - ${{ matrix.environment }}'
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # GitHub Environment for manual approval gate on prod
    # Configure in: Settings > Environments > prod > Required reviewers
    environment: ${{ matrix.environment }}

    strategy:
      fail-fast: false
      max-parallel: 1  # Apply envs sequentially: dev first, then prod
      matrix:
        environment: [dev, prod]

    env:
      TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_ssh_public_key }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init (with backend)
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}/environments/${{ matrix.environment }}

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: ${{ env.WORKING_DIR }}/environments/${{ matrix.environment }}

      - name: Terraform Apply
        run: |
          terraform apply \
            -auto-approve \
            tfplan-${{ matrix.environment }}
        working-directory: ${{ env.WORKING_DIR }}/environments/${{ matrix.environment }}

      - name: Terraform Output
        run: terraform output -json
        working-directory: ${{ env.WORKING_DIR }}/environments/${{ matrix.environment }}
