# terraform-docs Configuration
# https://terraform-docs.io/user-guide/configuration/
#
# Usage:
#   terraform-docs markdown table modules/vnet/ > modules/vnet/README.md
#   terraform-docs markdown table modules/vm/ > modules/vm/README.md
#   terraform-docs markdown table modules/blob-storage/ > modules/blob-storage/README.md
#
# Or with auto-injection (updates existing README.md between markers):
#   terraform-docs modules/vnet/

formatter: "markdown table"

version: ""

header-from: main.tf
footer-from: ""

recursive:
  enabled: false
  path: modules

sections:
  hide: []
  show:
    - requirements
    - providers
    - modules
    - resources
    - inputs
    - outputs

content: ""

output:
  file: README.md
  mode: inject  # inject between <!-- BEGIN_TF_DOCS --> and <!-- END_TF_DOCS --> markers
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

sort:
  enabled: true
  by: required  # required inputs first, then optional

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  read-comments: true
  required: true
  sensitive: true
  type: true
